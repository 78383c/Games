<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SPACE BLOB</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<style>
  :root{
    --ink:#060B14; --line:#0E2233; --bio:#7FD8FF; --coral:#FF5E5B; --text:#DCE9EE; --dim:#6E8794;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--ink);color:var(--text);
    font-family:ui-rounded,-apple-system,"SF Pro Rounded","Segoe UI",Roboto,sans-serif;
    touch-action:none;overscroll-behavior:none;user-select:none;-webkit-user-select:none}
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block}

  /* ---------- menu ---------- */
  #menu{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 90% at 50% 30%, #0A1626 0%, var(--ink) 70%);z-index:20}
  .slide{width:min(340px,88vw);background:rgba(10,22,38,.72);border:1px solid var(--line);
    border-radius:18px;padding:26px 22px;backdrop-filter:blur(8px);
    box-shadow:0 0 60px rgba(127,216,255,.10), inset 0 0 30px rgba(183,139,255,.05)}
  h1{font-size:34px;letter-spacing:.06em;text-align:center;color:var(--bio);
    text-shadow:0 0 18px rgba(127,216,255,.6);font-weight:800}
  .sub{text-align:center;color:var(--dim);font-size:12px;letter-spacing:.28em;margin:2px 0 20px}
  input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);
    background:#04101C;color:var(--text);font-size:16px;outline:none;margin-bottom:12px;text-align:center}
  input:focus{border-color:var(--bio)}
  .btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:16px;font-weight:700;
    letter-spacing:.05em;cursor:pointer;margin-top:8px}
  .btn.host{background:var(--bio);color:#071226}
  .btn.join{background:transparent;color:var(--bio);border:1.5px solid var(--bio)}
  .btn:active{transform:scale(.97)}
  #joinRow{display:none;margin-top:12px}
  #err{color:var(--coral);font-size:13px;text-align:center;margin-top:10px;min-height:16px}
  .hint{color:var(--dim);font-size:12px;text-align:center;margin-top:14px;line-height:1.5}

  /* ---------- HUD ---------- */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:none}
  #roomTag{position:fixed;top:calc(10px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    background:rgba(4,16,28,.8);border:1px solid var(--bio);border-radius:999px;
    padding:6px 16px;font-size:14px;letter-spacing:.12em;color:var(--bio);
    text-shadow:0 0 10px rgba(127,216,255,.65)}
  #board{position:fixed;top:calc(10px + env(safe-area-inset-top));right:10px;
    background:rgba(4,16,28,.65);border:1px solid var(--line);border-radius:12px;
    padding:8px 12px;font-size:12px;min-width:120px}
  #board div{display:flex;justify-content:space-between;gap:10px;padding:1px 0}
  #board .me{color:var(--bio)}
  #skins{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0 4px;
    max-height:132px;overflow-y:auto;padding:4px}
  #skins .sk{width:44px;height:44px;border-radius:50%;cursor:pointer;
    border:2px solid transparent;background:#12193A;display:flex;align-items:center;justify-content:center}
  #skins .sk img{width:38px;height:38px;border-radius:50%;pointer-events:none}
  #skins .sk.sel{border-color:var(--bio);box-shadow:0 0 12px rgba(127,216,255,.6)}
  #skins .plain{font-size:20px}
  #score{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    font-size:15px;color:var(--text);background:rgba(4,16,28,.65);border-radius:999px;padding:5px 16px}
  .act{position:fixed;right:14px;pointer-events:auto;border-radius:50%;
    border:2px solid var(--bio);background:rgba(4,16,28,.72);color:var(--bio);
    font-weight:800;letter-spacing:.04em;box-shadow:0 0 18px rgba(127,216,255,.3)}
  .act:active{background:rgba(127,216,255,.25)}
  #splitBtn{width:86px;height:86px;bottom:calc(20px + env(safe-area-inset-bottom));font-size:15px}
  #mergeBtn{width:64px;height:64px;bottom:calc(122px + env(safe-area-inset-bottom));font-size:12px;
    border-color:#B78BFF;color:#B78BFF;box-shadow:0 0 18px rgba(183,139,255,.25)}
  #pad{position:fixed;top:calc(12px + env(safe-area-inset-top));left:12px;font-size:13px;
    color:var(--dim);display:none}
  #toast{position:fixed;top:26%;left:50%;transform:translateX(-50%);font-size:22px;font-weight:800;
    color:var(--coral);text-shadow:0 0 16px rgba(255,94,91,.6);opacity:0;transition:opacity .3s}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="menu">
  <div class="slide">
    <h1>SPACE BLOB</h1>
    <div class="sub">COSMIC ARENA · 10 BLOBS · v0.3</div>
    <input id="nameIn" maxlength="12" placeholder="your name" autocomplete="off">
    <div class="sub" style="margin-top:10px">PICK YOUR SKIN</div>
    <div id="skins"></div>
    <button class="btn host" id="hostBtn">HOST A GAME</button>
    <button class="btn join" id="joinBtn">JOIN A GAME</button>
    <div id="joinRow">
      <input id="codeIn" maxlength="9" placeholder="code e.g. GK4P" autocomplete="off" style="text-transform:uppercase">
      <button class="btn host" id="goBtn">CONNECT</button>
    </div>
    <button class="btn join" id="soloBtn" style="display:none">PLAY SOLO VS BOTS</button>
    <div id="err"></div>
    <div class="hint">drag anywhere to steer · SPLIT / MERGE buttons<br>controllers supported · bots fill empty slots</div>
  </div>
</div>

<div id="hud">
  <div id="roomTag"></div>
  <div id="board"></div>
  <div id="score"></div>
  <button class="act" id="splitBtn">SPLIT</button>
  <button class="act" id="mergeBtn">MERGE</button>
  <div id="pad">🎮 controller connected</div>
  <div id="toast"></div>
</div>

<script>
"use strict";
/* ================= CONFIG ================= */
const WORLD = 6000;
const SLOTS = 10;
const FOOD_N = 700;
const START_MASS = 20;
const MIN_SPLIT_MASS = 36;
const MAX_CELLS = 16;
const mergeTime = m => Math.min(20, 8 + m*0.02);   // Nebulous-style: bigger = longer
const EAT_RATIO = 1.15;
const SNAP_HZ = 15;
const CODE_CHARS = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
const VIRUS_N = 16, VIRUS_MASS = 100, MAX_VIRUS = 24;

/* ================= STATE ================= */
let isHost=false, peer=null, conns=[];      // host: conns list; client: conns[0]
let myId=null, myName="blob";
let players=[];                              // host-authoritative
let food=new Map(), foodSeq=0, foodEaten=[], foodNew=[];
let running=false, lastT=0;
let cam={x:WORLD/2,y:WORLD/2,z:1};
let snapPrev=null, snapCur=null, snapT=0;   // client interpolation
let clientFood=new Map();
let input={dx:0,dy:0}, splitQueued=false, mergeQueued=false;
let joy=null;                 // {ax,ay,dx,dy} anchor + vector while dragging
let padOn=false, padPrev={};
let viruses=[];               // host-side; clients read from snapshots

const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
let DPR=1;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);
  cv.width=innerWidth*DPR; cv.height=innerHeight*DPR;}
addEventListener("resize",resize); resize();

const $=id=>document.getElementById(id);
const rnd=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const radius=m=>4+Math.sqrt(m)*4.2;
const lerp=(a,b,t)=>a+(b-a)*t;

/* ================= ENTITIES ================= */
function makeFood(){const id=foodSeq++;
  const f={id,x:rnd(60,WORLD-60),y:rnd(60,WORLD-60),h:Math.floor(rnd(0,360))};
  food.set(id,f); foodNew.push(f); return f;}

function makeVirus(x,y){viruses.push({x:x??rnd(200,WORLD-200),y:y??rnd(200,WORLD-200)});}

function makePlayer(name,isBot,skin){
  const p={id:"p"+Math.random().toString(36).slice(2,8),name,isBot,conn:null,
    hue:Math.floor(rnd(0,360)),skin:skin||"",cells:[],score:0,respawn:0,
    in:{dx:0,dy:0},split:false,ai:{t:0,tx:0,ty:0}};
  spawn(p); return p;}

function spawn(p){p.cells=[{x:rnd(300,WORLD-300),y:rnd(300,WORLD-300),
  m:p.keepM||START_MASS,ix:0,iy:0,mt:0}]; p.keepM=0;}

function totalMass(p){return p.cells.reduce((s,c)=>s+c.m,0);}

/* ================= HOST SIM ================= */
function hostStart(){
  players=[]; food.clear(); foodSeq=0; viruses=[];
  for(let i=0;i<FOOD_N;i++) makeFood();
  for(let i=0;i<VIRUS_N;i++) makeVirus();
  foodNew=[]; // initial food goes in init message, not diffs
  const me=makePlayer(myName,false,mySkin); myId=me.id; players.push(me);
  const bots=["Mito","Cyto","Lyso","Golgi","Vacu","Ribo","Nucleo","Plasmo","Flagel"];
  for(let i=0;i<SLOTS-1;i++) players.push(makePlayer(bots[i]||"Bot"+i,true));
}

function simulate(dt){
  // inputs -> my player
  const me=players.find(p=>p.id===myId);
  if(me){me.in.dx=input.dx; me.in.dy=input.dy;
    if(splitQueued){me.split=true; splitQueued=false;}
    if(mergeQueued){me.merge=true; mergeQueued=false;}}
  for(const p of players){
    if(p.isBot) botThink(p,dt);
    if(p.cells.length===0){p.respawn-=dt;
      if(p.respawn<=0){spawn(p); sendToPlayer(p,{t:"re"});} continue;}
    // split / merge requests
    if(p.split){p.split=false; doSplit(p);}
    if(p.merge){p.merge=false; doMergeAll(p);}
    p.score=Math.floor(totalMass(p));           // realtime leaderboard
    const len=Math.hypot(p.in.dx,p.in.dy)||1;
    const ux=p.in.dx/len, uy=p.in.dy/len, drive=Math.min(1,len);
    for(const c of p.cells){
      const sp=drive*240*Math.pow(c.m/START_MASS,-0.25);
      c.x+=(ux*sp+c.ix)*dt; c.y+=(uy*sp+c.iy)*dt;
      const dec=Math.pow(0.05,dt); c.ix*=dec; c.iy*=dec;
      c.mt=Math.max(0,c.mt-dt);
      // no mass decay — blobs keep what they eat
      const r=radius(c.m);
      c.x=clamp(c.x,r,WORLD-r); c.y=clamp(c.y,r,WORLD-r);
    }
    // merge-ready pieces drift toward the group's center so they can rejoin
    p.fm=Math.max(0,(p.fm||0)-dt);
    if(p.cells.length>1){
      const fm=p.fm>0;
      let gx=0,gy=0,gm=0;
      for(const c of p.cells){gx+=c.x*c.m;gy+=c.y*c.m;gm+=c.m;}
      gx/=gm;gy/=gm;
      for(const c of p.cells){
        if(fm) c.mt=Math.max(0,c.mt-dt*3);        // recall burns cooldown 4x total
        if(c.mt>0&&!fm) continue;
        const ddx=gx-c.x,ddy=gy-c.y,dd=Math.hypot(ddx,ddy);
        if(dd>1){const s=Math.min(fm?520:300,(fm?260:120)+dd*2.5);
          c.x+=ddx/dd*s*dt; c.y+=ddy/dd*s*dt;}
      }
    }
    selfCollide(p,dt);
  }
  virusHits();
  eatFood(); eatCells();
  for(const p of players) p.score=Math.max(p.score,Math.floor(totalMass(p)));
  while(food.size<FOOD_N) makeFood();
}

function doSplit(p){
  const add=[];
  for(const c of p.cells){
    if(c.m<MIN_SPLIT_MASS||p.cells.length+add.length>=MAX_CELLS) continue;
    c.m/=2;
    const len=Math.hypot(p.in.dx,p.in.dy);
    const ux=len>0.05?p.in.dx/len:1, uy=len>0.05?p.in.dy/len:0;
    const MT=mergeTime(c.m);
    const r=radius(c.m);
    const imp=500+r*9;                              // bigger halves launch further
    add.push({x:c.x+ux*r*0.9,y:c.y+uy*r*0.9,m:c.m,
      ix:ux*imp+c.ix*0.5,iy:uy*imp+c.iy*0.5,mt:MT}); // spawn at rim, inherit momentum
    c.ix-=ux*imp*0.12; c.iy-=uy*imp*0.12;           // slight recoil on the parent
    c.mt=Math.max(c.mt,MT);
  }
  p.cells.push(...add);
}

function doMergeAll(p){        // MERGE = "recall": 3s of strong pull + faster cooldown drain
  if(p.cells.length<2) return;
  p.fm=3;
}

function virusHits(){
  const rV=radius(VIRUS_MASS);
  for(const p of players){
    for(let ci=p.cells.length-1;ci>=0;ci--){
      const c=p.cells[ci];
      if(c.m<VIRUS_MASS*EAT_RATIO) continue;      // small cells hide safely
      const rc=radius(c.m);
      for(let vi=viruses.length-1;vi>=0;vi--){
        const v=viruses[vi];
        if(Math.hypot(v.x-c.x,v.y-c.y)<rc-rV*0.35){
          viruses.splice(vi,1);
          c.m+=55;                                 // you absorb it... then POP
          popCell(p,c);
          if(viruses.length<VIRUS_N) makeVirus();
          break;
        }
      }
    }
  }
}

function popCell(p,c){
  let n=0;
  while(p.cells.length<MAX_CELLS && c.m>44 && n<7){
    c.m/=2; n++;
    const a=rnd(0,Math.PI*2);
    const MT=mergeTime(c.m);
    p.cells.push({x:c.x,y:c.y,m:c.m,ix:Math.cos(a)*560,iy:Math.sin(a)*560,mt:MT});
    c.mt=Math.max(c.mt,MT);
  }
}

function selfCollide(p,dt){
  const cs=p.cells;
  for(let i=0;i<cs.length;i++)for(let j=i+1;j<cs.length;j++){
    let a=cs[i],b=cs[j];
    if(b.m>a.m){const t=a;a=b;b=t;}             // a = bigger cell
    if(b.m<=0||a.m<=0) continue;
    const ra=radius(a.m),rb=radius(b.m);
    const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||0.01;
    if(a.mt<=0&&b.mt<=0){
      if(d<ra+rb*0.25){                         // deep overlap: big one drinks the small one
        const dm=Math.min(b.m,Math.max(30,b.m*5)*dt);
        a.m+=dm; b.m-=dm;
        // suction pulls the small one toward the big one's center
        b.x+= -dx/d*140*dt; b.y+= -dy/d*140*dt;
        if(b.m<1.5){a.m+=b.m;b.m=0;}            // fully drained; swept below
      }
    }else if(d<ra+rb){                          // squishy push while on cooldown
      const push=(ra+rb-d)*0.55,ux=dx/d,uy=dy/d;
      const wa=b.m/(a.m+b.m), wb=a.m/(a.m+b.m); // mass-weighted: small yields more
      a.x-=ux*push*wa;a.y-=uy*push*wa;
      b.x+=ux*push*wb;b.y+=uy*push*wb;}
  }
  p.cells=cs.filter(c=>c.m>0);
}

function eatFood(){
  for(const p of players)for(const c of p.cells){
    const r=radius(c.m);
    for(const f of food.values()){
      const dx=f.x-c.x; if(dx>r||dx<-r) continue;
      const dy=f.y-c.y; if(dy>r||dy<-r) continue;
      if(dx*dx+dy*dy<r*r){c.m+=1;food.delete(f.id);foodEaten.push(f.id);}
    }
  }
}

function eatCells(){
  for(const A of players)for(const B of players){
    if(A===B||A.cells.length===0) continue;
    for(const ca of A.cells){
      const ra=radius(ca.m);
      for(let k=B.cells.length-1;k>=0;k--){
        const cb=B.cells[k];
        if(ca.m<cb.m*EAT_RATIO) continue;
        const rb=radius(cb.m);
        if(Math.hypot(cb.x-ca.x,cb.y-ca.y)<ra-rb*0.35){
          ca.m+=cb.m; B.cells.splice(k,1);
          if(B.cells.length===0){B.respawn=3;
            B.keepM=Math.max(START_MASS,Math.floor(B.score*0.2)); // keep 20% on death
            sendToPlayer(B,{t:"dead"});
            if(B.id===myId&&isHost) showToast("EATEN!");}
        }
      }
    }
  }
}

/* --------- bots --------- */
function botThink(p,dt){
  p.ai.t-=dt;
  if(p.cells.length===0) return;
  const c=p.cells[0], myM=totalMass(p);
  if(p.ai.t<=0){
    p.ai.t=0.4+Math.random()*0.4;
    let tx=null,ty=null,best=1e9,flee=null,fd=1e9,prey=null,pd=1e9;
    for(const q of players){
      if(q===p||q.cells.length===0) continue;
      for(const qc of q.cells){
        const d=Math.hypot(qc.x-c.x,qc.y-c.y);
        if(qc.m>myM*1.25&&d<radius(qc.m)+420&&d<fd){fd=d;flee=qc;}
        if(myM>qc.m*1.4&&d<560&&d<pd){pd=d;prey=qc;}
      }
    }
    if(flee){p.ai.tx=c.x-(flee.x-c.x);p.ai.ty=c.y-(flee.y-c.y);}
    else if(prey){p.ai.tx=prey.x;p.ai.ty=prey.y;
      if(pd<260&&myM>prey.m*2.6&&c.m>MIN_SPLIT_MASS&&p.cells.length<3&&Math.random()<0.25){
        p.in.dx=prey.x-c.x;p.in.dy=prey.y-c.y;p.split=true;}}
    else{for(const f of food.values()){
        const d=Math.abs(f.x-c.x)+Math.abs(f.y-c.y);
        if(d<best){best=d;tx=f.x;ty=f.y;}}
      if(tx!=null){p.ai.tx=tx;p.ai.ty=ty;}}
  }
  p.in.dx=p.ai.tx-c.x; p.in.dy=p.ai.ty-c.y;
}

/* ================= NETWORK ================= */
function newCode(){let s="";for(let i=0;i<4;i++)s+=CODE_CHARS[Math.floor(Math.random()*CODE_CHARS.length)];return s;}

function startSolo(){
  isHost=true; conns=[]; hostStart(); startPlay("SOLO");
}

function connFail(msg){
  $("err").textContent=msg;
  $("soloBtn").style.display="block";   // offer solo as an explicit choice
}

function hostGame(){
  if(typeof Peer==="undefined"){
    connFail("connection library failed to load — no internet, or this viewer blocks it");
    return;}
  const code=newCode();
  peer=new Peer("spaceblob-"+code,{debug:1});
  $("err").textContent="opening game…";
  const fallback=setTimeout(()=>{if(!running){try{peer.destroy();}catch(_){}
    connFail("couldn't reach the matchmaking service (timeout)");}},8000);
  peer.on("open",()=>{
    clearTimeout(fallback);
    isHost=true; hostStart(); startPlay(code);
  });
  peer.on("error",e=>{
    if(e.type==="unavailable-id"){clearTimeout(fallback);peer.destroy();hostGame();}
    else if(!running){clearTimeout(fallback);
      connFail("connection error: "+e.type);}
  });
  peer.on("connection",conn=>{
    conn.on("open",()=>{});
    conn.on("data",d=>hostOnData(conn,d));
    conn.on("close",()=>dropConn(conn));
  });
}

function hostOnData(conn,d){
  if(d.t==="hi"){
    if(conn._pid) return;                       // duplicate hi
    const bi=players.findIndex(p=>p.isBot);
    if(bi<0){conn.send({t:"full"});return;}     // no free slot
    players.splice(bi,1);                       // newcomer replaces a bot
    if(conns.indexOf(conn)<0) conns.push(conn);
    const name=String(d.n||"blob").replace(/[<>&"']/g,"").slice(0,12)||"blob";
    const skin=SKIN_DATA[d.k]?d.k:"";
    const np=makePlayer(name,false,skin);
    np.conn=conn; players.push(np); conn._pid=np.id;
    conn.send({t:"init",id:np.id,w:WORLD,f:[...food.values()]});
  }else if(d.t==="in"){
    const p=players.find(x=>x.id===conn._pid);
    if(p){p.in.dx=d.x;p.in.dy=d.y;}
  }else if(d.t==="sp"){
    const p=players.find(x=>x.id===conn._pid); if(p)p.split=true;
  }else if(d.t==="mg"){
    const p=players.find(x=>x.id===conn._pid); if(p)p.merge=true;
  }
}

function dropConn(conn){
  const i=players.findIndex(p=>p.id===conn._pid);
  if(i>=0){players.splice(i,1);
    players.push(makePlayer("Bot"+Math.floor(rnd(10,99)),true));}
  conns=conns.filter(c=>c!==conn);
}

function sendToPlayer(p,msg){if(p.conn&&p.conn.open)p.conn.send(msg);}

function broadcast(){
  const snap={t:"st",
    p:players.map(p=>({i:p.id,n:p.name,h:p.hue,s:p.score,b:p.isBot?1:0,k:p.skin,
      c:p.cells.map(c=>[Math.round(c.x),Math.round(c.y),Math.round(c.m*10)/10,Math.round(c.mt*10)/10])})),
    fe:foodEaten,fn:foodNew,
    v:viruses.map(v=>[Math.round(v.x),Math.round(v.y)])};
  foodEaten=[];foodNew=[];
  for(const c of conns) if(c.open) c.send(snap);
}

function joinGame(code){
  peer=new Peer({debug:1});
  $("err").textContent="connecting…";
  let joinTO=null,watchIce=null;
  const settle=()=>{if(joinTO)clearTimeout(joinTO);if(watchIce)clearInterval(watchIce);};
  peer.on("error",e=>{
    settle();
    $("err").textContent = e.type==="peer-unavailable" ? "no game with that code" : "connection error: "+e.type;
  });
  peer.on("open",()=>{
    const conn=peer.connect("spaceblob-"+code.toUpperCase(),{reliable:true});
    conns=[conn];
    const natMsg="found the game but couldn't connect — likely both devices are behind strict mobile NAT (a TURN server would fix this)";
    joinTO=setTimeout(()=>{
      if(!running){settle();try{peer.destroy();}catch(_){}connFail(natMsg);}
    },12000);
    // report ICE failure as soon as WebRTC gives up (faster than the timeout)
    watchIce=setInterval(()=>{
      const pc=conn.peerConnection;
      if(!pc) return;
      clearInterval(watchIce);
      pc.oniceconnectionstatechange=()=>{
        if((pc.iceConnectionState==="failed"||pc.iceConnectionState==="disconnected")&&!running){
          settle();try{peer.destroy();}catch(_){}connFail(natMsg);}
      };
    },200);
    conn.on("open",()=>conn.send({t:"hi",n:myName,k:mySkin}));
    conn.on("data",d=>{
      if(d.t==="init"){settle();
        myId=d.id;clientFood=new Map(d.f.map(f=>[f.id,f]));
        isHost=false; startPlay(code.toUpperCase());}
      else if(d.t==="st"){snapPrev=snapCur;snapCur=d;snapT=0;
        for(const id of d.fe) clientFood.delete(id);
        for(const f of d.fn) clientFood.set(f.id,f);}
      else if(d.t==="dead") showToast("EATEN!");
      else if(d.t==="full"){settle();$("err").textContent="that game is full (10 players)";}
    });
    conn.on("close",()=>{if(!running)return;showToast("HOST LEFT");setTimeout(()=>location.reload(),1800);});
  });
}

/* ================= INPUT ================= */
function pollInput(){
  if(joy){ input.dx=joy.dx; input.dy=joy.dy; return; }
  // gamepad: left stick steer, A=split, B/X/Y=merge
  const gps=navigator.getGamepads?navigator.getGamepads():[];
  const gp=gps&&[...gps].find(g=>g&&g.connected);
  if(gp){
    if(!padOn){padOn=true;$("pad").style.display="block";}
    const dz=v=>Math.abs(v)<0.15?0:v;
    const ax=dz(gp.axes[0]||0), ay=dz(gp.axes[1]||0);
    if(ax||ay){input.dx=clamp(ax,-1,1);input.dy=clamp(ay,-1,1);}
    else if(padOn){input.dx=0;input.dy=0;}
    const edge=(i)=>{const now=!!(gp.buttons[i]&&gp.buttons[i].pressed);
      const was=!!padPrev[i]; padPrev[i]=now; return now&&!was;};
    if(edge(0)) queueSplit();
    if(edge(1)||edge(2)||edge(3)) queueMerge();
  }else if(padOn){padOn=false;$("pad").style.display="none";}
}

/* ================= RENDER ================= */
const STARS=(()=>{let s=42;const rr=()=>((s=s*16807%2147483647)/2147483647);
  const a=[];for(let i=0;i<1400;i++)a.push([rr()*WORLD,rr()*WORLD,rr()<0.85?2:4]);return a;})();
function view(){
  // returns [players-like list, myCells] for rendering (host: live, client: interpolated)
  if(isHost) return players.map(p=>({n:p.name,h:p.hue,i:p.id,s:p.score,b:p.isBot?1:0,k:p.skin,
    c:p.cells.map(c=>[c.x,c.y,c.m,c.mt])}));
  if(!snapCur) return [];
  if(!snapPrev) return snapCur.p;
  const t=clamp(snapT*SNAP_HZ,0,1), out=[];
  for(const p of snapCur.p){
    const q=snapPrev.p.find(x=>x.i===p.i);
    if(!q||q.c.length!==p.c.length){out.push(p);continue;}
    out.push({...p,c:p.c.map((c,k)=>[lerp(q.c[k][0],c[0],t),lerp(q.c[k][1],c[1],t),lerp(q.c[k][2],c[2],t),c[3]])});
  }
  return out;
}

function draw(dt){
  const ps=view();
  const me=ps.find(p=>p.i===myId);
  // camera
  if(me&&me.c.length){
    let mx=0,my=0,mm=0,tr=0,minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
    for(const c of me.c){mx+=c[0]*c[2];my+=c[1]*c[2];mm+=c[2];
      const r=radius(c[2]);tr+=r;
      minX=Math.min(minX,c[0]-r);maxX=Math.max(maxX,c[0]+r);
      minY=Math.min(minY,c[1]-r);maxY=Math.max(maxY,c[1]+r);}
    mx/=mm;my/=mm;
    cam.x=mx; cam.y=my;                       // hard-lock: blob always dead-center
    const span=clamp(tr*14,650,2400);          // world units visible on short screen axis
    // widen further if split pieces would leave the frame (centroid stays centered)
    const spanX=2*Math.max(mx-minX,maxX-mx)+260;
    const spanY=2*Math.max(my-minY,maxY-my)+260;
    const tz=Math.min(Math.min(innerWidth,innerHeight)/span,
                      innerWidth/spanX, innerHeight/spanY);
    cam.z=lerp(cam.z,tz,1-Math.pow(tz<cam.z?0.02:0.1,dt)); // zoom out fast, zoom in gently
  }
  const W=cv.width,H=cv.height,z=cam.z*DPR;
  // nebula backdrop
  const bg=ctx.createRadialGradient(W*0.3,H*0.25,0,W*0.5,H*0.5,Math.max(W,H));
  bg.addColorStop(0,"#141A3B");bg.addColorStop(0.45,"#0C0A26");bg.addColorStop(1,"#04060F");
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.translate(W/2,H/2);ctx.scale(z,z);ctx.translate(-cam.x,-cam.y);
  const vw=W/z,vh=H/z,x0=cam.x-vw/2,y0=cam.y-vh/2;
  // starfield (world-anchored, deterministic)
  const starA=clamp((cam.z-0.15)*1.8,0.05,0.45);   // fade stars as you zoom out
  ctx.fillStyle=`rgba(200,218,255,${starA})`;
  const ss=Math.min(1/cam.z,5);                      // cap star size
  for(const s of STARS){
    if(s[0]<x0-8||s[0]>x0+vw+8||s[1]<y0-8||s[1]>y0+vh+8) continue;
    ctx.fillRect(s[0],s[1],s[2]*ss,s[2]*ss);
  }
  // grid
  ctx.strokeStyle="rgba(30,48,90,.5)";ctx.lineWidth=1/cam.z;
  ctx.beginPath();
  for(let x=Math.floor(x0/100)*100;x<x0+vw;x+=100){ctx.moveTo(x,y0);ctx.lineTo(x,y0+vh);}
  for(let y=Math.floor(y0/100)*100;y<y0+vh;y+=100){ctx.moveTo(x0,y);ctx.lineTo(x0+vw,y);}
  ctx.stroke();
  // world edge
  ctx.strokeStyle="rgba(150,170,255,.55)";ctx.lineWidth=6/cam.z;
  ctx.shadowColor="rgba(150,170,255,.8)";ctx.shadowBlur=30;
  ctx.strokeRect(0,0,WORLD,WORLD);ctx.shadowBlur=0;
  // food
  const fsrc=isHost?food:clientFood;
  for(const f of fsrc.values()){
    if(f.x<x0-20||f.x>x0+vw+20||f.y<y0-20||f.y>y0+vh+20) continue;
    ctx.fillStyle=`hsl(${f.h} 95% 68%)`;
    const fr=Math.max(7,5/cam.z);                    // pellets never shrink below ~5px on screen
    ctx.beginPath();ctx.arc(f.x,f.y,fr,0,7);ctx.fill();
  }
  // viruses (spiky green)
  const vs=isHost?viruses.map(v=>[v.x,v.y]):(snapCur&&snapCur.v)||[];
  const rV=radius(VIRUS_MASS);
  for(const v of vs){
    if(v[0]<x0-rV||v[0]>x0+vw+rV||v[1]<y0-rV||v[1]>y0+vh+rV) continue;
    ctx.beginPath();
    for(let i=0;i<=36;i++){
      const a=i/36*Math.PI*2, rr=rV*(i%2?0.88:1.0);
      const px=v[0]+Math.cos(a)*rr, py=v[1]+Math.sin(a)*rr;
      i?ctx.lineTo(px,py):ctx.moveTo(px,py);
    }
    ctx.closePath();
    ctx.fillStyle="rgba(110,255,94,.28)";ctx.fill();
    ctx.lineWidth=3/cam.z+2;ctx.strokeStyle="#6EFF5E";ctx.stroke();
  }
  // cells (small first so big draw on top)
  const all=[];
  for(const p of ps)for(const c of p.c)all.push({p,c});
  all.sort((a,b)=>a.c[2]-b.c[2]);
  const t=performance.now()/1000;
  for(const {p,c} of all){
    const [x,y,m]=c,r=radius(m);
    if(x<x0-r||x>x0+vw+r||y<y0-r||y>y0+vh+r) continue;
    const wob=1+Math.sin(t*3+x*0.01)*0.015;
    const g=ctx.createRadialGradient(x,y,r*0.2,x,y,r*wob);
    g.addColorStop(0,`hsl(${p.h} 85% 62%)`);
    g.addColorStop(1,`hsl(${p.h} 90% 40%)`);
    if(!p.b){ctx.shadowColor=p.i===myId?"rgba(127,216,255,.95)":`hsla(${p.h} 95% 70% / .85)`;
      ctx.shadowBlur=p.i===myId?34:24;}
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(x,y,r*wob,0,7);ctx.fill();
    ctx.shadowBlur=0;
    const sk=skinImg(p.k);
    if(sk){ctx.save();ctx.beginPath();ctx.arc(x,y,r*wob,0,7);ctx.clip();
      ctx.drawImage(sk,x-r*wob,y-r*wob,r*wob*2,r*wob*2);ctx.restore();}
    ctx.lineWidth=Math.max(2,r*0.07);
    ctx.strokeStyle=`hsl(${p.h} 95% ${p.i===myId?78:30}%)`;
    ctx.stroke();
    // nucleus (plain blobs only)
    if(!sk){ctx.fillStyle=`hsla(${p.h} 90% 80% / .5)`;
      ctx.beginPath();ctx.arc(x,y,r*0.28,0,7);ctx.fill();}
    if(r*cam.z>14){
      ctx.fillStyle="rgba(255,255,255,.92)";
      ctx.font=`700 ${Math.max(11,r*0.34)}px ui-rounded,sans-serif`;
      ctx.textAlign="center";ctx.textBaseline="middle";
      if(sk){ctx.lineWidth=Math.max(2,r*0.05);ctx.strokeStyle="rgba(0,0,0,.55)";
        ctx.strokeText(p.n,x,y);}
      ctx.fillText(p.n,x,y);
      if(p.i===myId&&c[3]>0.05){
        ctx.fillStyle="rgba(255,255,255,.7)";
        ctx.font=`700 ${Math.max(10,r*0.26)}px ui-rounded,sans-serif`;
        ctx.fillText(Math.ceil(c[3]),x,y+r*0.45);
      }
    }
  }
  ctx.restore();
  // joystick visual
  if(joy){
    ctx.strokeStyle="rgba(220,233,238,.35)";ctx.lineWidth=2*DPR;
    ctx.beginPath();ctx.arc(joy.ax*DPR,joy.ay*DPR,55*DPR,0,7);ctx.stroke();
    ctx.fillStyle="rgba(127,216,255,.55)";
    ctx.beginPath();ctx.arc((joy.ax+joy.dx*55)*DPR,(joy.ay+joy.dy*55)*DPR,20*DPR,0,7);ctx.fill();
  }
  // HUD
  const esc=s=>String(s).replace(/[<>&"']/g,"");
  const sorted=[...ps].sort((a,b)=>b.s-a.s);
  $("board").innerHTML=sorted.map((p,i)=>
    `<div class="${p.i===myId?'me':''}"><span>${i+1}. ${esc(p.n)}</span><span>${p.s}</span></div>`).join("");
  if(me)$("score").textContent="mass "+Math.floor(me.c.reduce((s,c)=>s+c[2],0));
}

/* ================= LOOP ================= */
function loop(ts){
  if(!running)return;
  const dt=Math.min(0.05,(ts-lastT)/1000||0.016);lastT=ts;
  pollInput();
  if(isHost){
    simulate(dt);
    loop._acc=(loop._acc||0)+dt;
    if(loop._acc>=1/SNAP_HZ){loop._acc=0;broadcast();}
  }else{
    snapT+=dt;
    loop._iacc=(loop._iacc||0)+dt;
    if(loop._iacc>=1/SNAP_HZ&&conns[0]&&conns[0].open){loop._iacc=0;
      conns[0].send({t:"in",x:input.dx,y:input.dy});}
  }
  draw(dt);
  requestAnimationFrame(loop);
}

function startPlay(code){
  $("menu").style.display="none";$("hud").style.display="block";
  $("roomTag").textContent=code;
  running=true;lastT=performance.now();
  requestAnimationFrame(loop);
}

function showToast(msg){const el=$("toast");el.textContent=msg;el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,1600);}

const SKIN_LIST=Object.keys(SKIN_DATA);
const SKIN_URL=c=>"data:image/svg+xml,"+encodeURIComponent(SKIN_DATA[c]);
let mySkin="";                                   // "" = plain blob
const skinCache={};
function skinImg(c){
  if(!c||!SKIN_DATA[c]) return null;
  let e=skinCache[c];
  if(!e){e=skinCache[c]={img:new Image(),cv:null};e.img.src=SKIN_URL(c);}
  if(e.cv) return e.cv;
  if(e.img.complete&&e.img.naturalWidth>0){       // rasterize once to a bitmap
    const cc=document.createElement("canvas");cc.width=cc.height=256;
    cc.getContext("2d").drawImage(e.img,0,0,256,256);
    return e.cv=cc;
  }
  return null;
}
(function buildSkins(){
  const box=$("skins");
  const mk=(code,inner)=>{
    const d=document.createElement("div");
    d.className="sk"+(code===mySkin?" sel":"");d.dataset.c=code;d.innerHTML=inner;
    d.addEventListener("click",()=>{mySkin=code;
      box.querySelectorAll(".sk").forEach(e=>e.classList.toggle("sel",e.dataset.c===code));});
    box.appendChild(d);
  };
  mk("",'<span class="plain">🫧</span>');         // no skin
  for(const c of SKIN_LIST) mk(c,`<img src="${SKIN_URL(c)}" alt="${c}" loading="lazy">`);
})();

/* ================= MENU ================= */
$("hostBtn").addEventListener("click",()=>{
  myName=($("nameIn").value||"blob").slice(0,12);
  hostGame();
});
$("joinBtn").addEventListener("click",()=>{
  $("joinRow").style.display="block";$("codeIn").focus();
});
$("soloBtn").addEventListener("click",()=>{
  myName=($("nameIn").value||"blob").slice(0,12);
  startSolo();
});
$("goBtn").addEventListener("click",async()=>{
  if(typeof Peer==="undefined"){connFail("connection library failed to load — no internet, or this viewer blocks it");return;}
  const code=$("codeIn").value.trim();
  if(code.length<4){$("err").textContent="enter the 4-letter code";return;}
  myName=($("nameIn").value||"blob").slice(0,12);
  joinGame(code);
});
</script>
